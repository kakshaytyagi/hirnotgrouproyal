<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hirnot Group Royal - Redefining luxury real estate and comfort. Stay tuned for our visionary living experience." />
  <meta name="keywords" content="Hirnot Group, Real Estate, Luxury Living, Coming Soon, Property" />
  <meta property="og:title" content="Hirnot Group Royal - Coming Soon" />
  <meta property="og:description" content="A new legacy begins. Discover our upcoming premium real estate project." />
  <meta property="og:image" content="https://kakshaytyagi.github.io/hirnotgrouproyal/background.png" />
  <meta property="og:url" content="https://kakshaytyagi.github.io/hirnotgrouproyal/" />
  <meta property="og:type" content="website" />
  <script src="https://kit.fontawesome.com/9a00dfd817.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Hirnotgrouplogo.png" />
  <title>Hirnot Group Royal - Coming Soon</title>
</head>
<body>
  <header>
    <a href="#" class="logo">
      <span>HIRNOT GROUP <span style="color: #d4af37;">ROYAL</span></span>
    </a>
  </header>
  
  <section>
    <div class="contentBx">
      <img src="Hirnotgrouplogo.png" alt="Hirnot Group Logo" id="hero-logo" style="max-height: 160px; margin-bottom: 30px; border-radius: 20px;">
      <h2 class="gradient-text">Coming Soon</h2>
      <p>
        We are crafting something extraordinary. Our upcoming premium real estate project will redefine luxury and comfort. Stay tuned for a visionary living experience.
      </p>
      <a href="#" class="btn" onclick="toggle(); return false;">Notify Me!</a>
    </div>
    <div class="imgBx">
      <!-- Using the luxury building render for the split design -->
      <img src="background.png" alt="Luxury Real Estate"/>
    </div>
    

  </section>

  <div class="newsletter">
    <a href="#" onclick="toggle(); return false;" class="close"><i class="fas fa-times"></i></a>
    <h2>Stay Tuned</h2>
    <p>Get notified at launch</p>
    <div class="inputBox">
      <form onsubmit="submitForm(event)">
        <input type="tel" id="phoneInput" required placeholder="Enter Phone Number" pattern="[0-9]{10,15}" title="Please enter a valid phone number" />
        <input type="submit" value="Submit" id="submitBtn" />
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
